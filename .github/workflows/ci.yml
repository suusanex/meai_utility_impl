name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tfm: [net8.0, net10.0]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore
        run: dotnet restore MeAiUtility.sln
      - name: Build
        run: dotnet build MeAiUtility.sln -f ${{ matrix.tfm }} -warnaserror --no-restore
      - name: Test
        run: dotnet test MeAiUtility.sln -f ${{ matrix.tfm }} --no-build
