name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore MeAiUtility.sln

      - name: Build (Release)
        run: dotnet build MeAiUtility.sln -c Release --no-restore

      - name: Collect artifacts
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          LIBRARY_PROJECTS=(
            "src/MeAiUtility.MultiProvider"
            "src/MeAiUtility.MultiProvider.OpenAI"
            "src/MeAiUtility.MultiProvider.AzureOpenAI"
            "src/MeAiUtility.MultiProvider.GitHubCopilot"
          )
          for TFM in net8.0 net10.0; do
            mkdir -p "dist/${TFM}"
            for PROJECT in "${LIBRARY_PROJECTS[@]}"; do
              cp "${PROJECT}/bin/Release/${TFM}"/MeAiUtility.*.dll  "dist/${TFM}/" 2>/dev/null || true
              cp "${PROJECT}/bin/Release/${TFM}"/MeAiUtility.*.xml  "dist/${TFM}/" 2>/dev/null || true
            done
            (cd dist && zip -r "MeAiUtility-${TAG}-${TFM}.zip" "${TFM}/")
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/MeAiUtility-*.zip
